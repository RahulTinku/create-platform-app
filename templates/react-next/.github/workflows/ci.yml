name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Provide a dummy secret so next build doesn't throw on missing AUTH_SECRET
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-build-placeholder-not-for-runtime' }}
